server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  # Send to Loki if available, otherwise logs stay local
  - url: ${LOKI_URL:-http://localhost:3100/loki/api/v1/push}

scrape_configs:
  - job_name: flutch-engine
    static_configs:
      - targets:
          - localhost
        labels:
          job: flutch-engine
          __path__: /var/log/*.log
