services:
  twenty-server:
    image: twentycrm/twenty:latest
    ports:
      - "3020:3000"
    volumes:
      - twenty-local-data:/app/packages/twenty-server/.local-storage
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://twenty:twenty@twenty-db:5432/default
      SERVER_URL: http://localhost:3020
      REDIS_URL: redis://twenty-redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET:-change-me-twenty-secret-key-12345}
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/healthz
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  twenty-worker:
    image: twentycrm/twenty:latest
    volumes:
      - twenty-local-data:/app/packages/twenty-server/.local-storage
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://twenty:twenty@twenty-db:5432/default
      SERVER_URL: http://localhost:3020
      REDIS_URL: redis://twenty-redis:6379
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
      APP_SECRET: ${TWENTY_APP_SECRET:-change-me-twenty-secret-key-12345}
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-server:
        condition: service_healthy
    restart: unless-stopped

  twenty-db:
    image: postgres:16
    ports:
      - "5445:5432"
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: twenty
      POSTGRES_PASSWORD: twenty
    volumes:
      - twenty-db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U twenty -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  twenty-redis:
    image: redis
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  twenty-db-data:
  twenty-local-data:
