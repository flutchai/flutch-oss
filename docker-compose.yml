services:
  # Flutch OSS agent engine
  engine:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=${API_URL}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-flutch}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-flutch}
      - POSTGRES_DB=${POSTGRES_DB:-flutch_oss}
    depends_on:
      - postgres
      - ragflow
    restart: unless-stopped

  # PostgreSQL — single instance, separate DB per service
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flutch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flutch}
      POSTGRES_DB: ${POSTGRES_DB:-flutch_oss}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Ragflow for knowledge base
  ragflow:
    image: infiniflow/ragflow:latest
    ports:
      - "9380:9380"
    volumes:
      - ragflow_data:/ragflow/data
    restart: unless-stopped

  # Log collector — sends logs to Loki or local file
  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log:ro
      - ./config/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  # Metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  ragflow_data:
  prometheus_data:
